<script>
    const targetDate = new Date("April 10, 2026 09:00:00").getTime();

    const tickSound = new Audio("tick.mp3");
    const endSound = new Audio("end.mp3");

    let soundEnabled = false;

    function enableSound() {
        soundEnabled = true;

        // Débloque audio navigateur
        tickSound.play().then(() => {
            tickSound.pause();
            tickSound.currentTime = 0;
        });
    }

    function toggleSound() {
        soundEnabled = !soundEnabled;

        const btn = document.getElementById("soundToggle");
        btn.innerText = soundEnabled ? "🔇 Désactiver Son" : "🔊 Activer Son";
    }

    function updateCountdown() {
        const now = new Date().getTime();
        const gap = targetDate - now;

        if (gap <= 0) {
            document.getElementById("countdown").innerHTML = "🔥 L'événement a commencé !";

            if (soundEnabled) {
                endSound.play();
            }

            // 📳 vibration mobile
            if (navigator.vibrate) {
                navigator.vibrate([300, 100, 300, 100, 500]);
            }

            return;
        }

        const days = Math.floor(gap / (1000 * 60 * 60 * 24));
        const hours = Math.floor((gap / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((gap / (1000 * 60)) % 60);
        const seconds = Math.floor((gap / 1000) % 60);

        document.getElementById("countdown").innerHTML =
            `${days} jours <br> ${hours.toString().padStart(2,'0')}h : ${minutes.toString().padStart(2,'0')}m : ${seconds.toString().padStart(2,'0')}s`;

        // 🔊 tick chaque seconde
        if (soundEnabled) {
            tickSound.currentTime = 0;
            tickSound.play().catch(() => {});
        }
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
</script>

    const targetDate = new Date("April 10, 2026 09:00:00").getTime();

    function updateCountdown() {

            document.getElementById("countdown").innerHTML = "🔥 L'événement a commencé !";
            return;
        }

        const days = Math.floor(gap / (1000 * 60 * 60 * 24));
        const hours = Math.floor((gap / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((gap / (1000 * 60)) % 60);
        const seconds = Math.floor((gap / 1000) % 60);
