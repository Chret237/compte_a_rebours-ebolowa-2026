<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Compte à rebours programme jeunesse édition Ebolowa 2026"/>
<link rel="icon" type="image/png" href="./icon.png">
<title>Rencontre Jeunesse</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: fantasy;
    }

    body {
        background: linear-gradient(135deg, #0b3c40);
        color: white;
    }
    
    /* Bande du haut */
    .top-bar {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        padding: 15px 25px;
        background: transparent;
    }

    /* Badge 4ème édition */
    .badge {
        background: #f4b400;
        color: white;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: bold;
        text-transform: uppercase;
        text-align: center;
    }

    /* Texte principal */
    .title {
        color: white;
        font-size: 18px;
        letter-spacing: 2px;
        font-weight: 500;
    }
    
    .title span {
        text-align: center;
        letter-spacing: 7.2px;
    }


    main {
        text-align: center;
        padding: 40px 20px;
    }

    main h1 {
        font-size: 40px;
        color: #f4b400;
    }

    main h2 {
        font-size: 28px;
        margin-top: 10px;
    }
    
    img {
        height: 40px;
        width: 40px;
        margin-bottom: 20px;
    }

    .date {
        margin-top: 15px;
        font-size: 18px;
        opacity: 0.8;
    }

    .countdown {
        margin: 30px auto;
        background: white;
        color: #333;
        padding: 25px;
        border-radius: 15px;
        width: 320px;
        font-size: 26px;
        font-weight: bold;
    }
    
    button {
        margin-top:15px;
        padding:10px 15px;
        border:none;
        border-radius:10px;
        background:#f4b400;
        color:white;
        font-weight:bold;
        cursor:pointer;
    }
</style>

</head>
<body onclick="enableSound()">
    
<!-- <header class="top-bar">
    <div class="badge">4ème édition</div>
    <div class="title">JEUNESSE ENRACINÉE <span>EN YÉHOSHOUA</span></div>
</header>  -->

<main>
    <img src="./icon.png" alt="">
    <h1>EBOLOWA</h1>
    <h2>Rencontre Jeunesse</h2>
    <div class="date">Du 10 au 12 Avril 2026</div>

    <div class="countdown" id="countdown">Chargement...</div>
    
    <button id="soundToggle"                     onclick="toggleSound()">
        🔊 Activer Son
    </button>
</main>

<script>
    const targetDate = new Date("April 10, 2026 09:00:00").getTime();

    const tickSound = new Audio("tick.mp3");
    const endSound = new Audio("end.mp3");

    let soundEnabled = false;

    function enableSound() {
        soundEnabled = true;

        // Débloque audio navigateur
        tickSound.play().then(() => {
            tickSound.pause();
            tickSound.currentTime = 0;
        });
    }

    function toggleSound() {
        soundEnabled = !soundEnabled;

        const btn = document.getElementById("soundToggle");
        btn.innerText = soundEnabled ? "🔇 Désactiver Son" : "🔊 Activer Son";
    }

    function updateCountdown() {
        const now = new Date().getTime();
        const gap = targetDate - now;

        if (gap <= 0) {
            document.getElementById("countdown").innerHTML = "🔥 L'événement a commencé !";

            if (soundEnabled) {
                endSound.play();
            }

            // 📳 vibration mobile
            if (navigator.vibrate) {
                navigator.vibrate([300, 100, 300, 100, 500]);
            }

            return;
        }

        const days = Math.floor(gap / (1000 * 60 * 60 * 24));
        const hours = Math.floor((gap / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((gap / (1000 * 60)) % 60);
        const seconds = Math.floor((gap / 1000) % 60);

        document.getElementById("countdown").innerHTML =
            `${days} jours <br> ${hours.toString().padStart(2,'0')}h : ${minutes.toString().padStart(2,'0')}m : ${seconds.toString().padStart(2,'0')}s`;

        // 🔊 tick chaque seconde
        if (soundEnabled) {
            tickSound.currentTime = 0;
            tickSound.play().catch(() => {});
        }
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
</script>

<script>
    function enableSound() {
        tickSound.play().then(() => {
            tickSound.pause();
            tickSound.currentTime = 0;
        });
    }
</script>

</body>
</html>
